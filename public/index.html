<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loaigle</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="login-gate" style="display: flex; position: fixed; inset: 0; background: #171717; z-index: 60000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;">
        <div style="background: #202124; border: 1px solid #3c4043; border-radius: 16px; max-width: 400px; width: 100%; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; font-family: monospace; color: white;">
            <div style="font-size: 36px; font-weight: bold; margin-bottom: 8px; color: #ffffff;">Loaigle</div>
            <p style="color: #9aa0a6; font-size: 12px; margin-bottom: 30px; line-height: 1.4;">Secure Node Gateway Deployment Protocol</p>
            
            <button onclick="triggerGoogleLogin()" style="width: 100%; padding: 14px; border: none; border-radius: 24px; background: #ea4335; color: white; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 12px; font-family: monospace;">Sign in with Google Net</button>
            <button onclick="triggerGithubLogin()" style="width: 100%; padding: 14px; border: 1px solid #5f6368; border-radius: 24px; background: #24292e; color: white; font-weight: bold; cursor: pointer; font-size: 14px; font-family: monospace;">Sign in with GitHub Node</button>
        </div>
    </div>

    <div id="main-app-canvas" style="display: none; width: 100%; min-height: 100vh; box-sizing: border-box;">
        <div style="width: 100%; display: flex; justify-content: flex-end; padding: 15px; box-sizing: border-box;">
            <button onclick="toggleSettingsMenu()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #bdc1c6; padding: 5px 10px;">⚙️</button>
        </div>

        <div class="logo">Loaigle</div>

        <div class="search-box">
            <button id="loaigle-back-btn" onclick="returnToHomeMenu()" style="display: none; padding: 14px 20px; font-size: 16px; border: none; border-radius: 24px; background-color: #303134; color: #8ab4f8; cursor: pointer; font-weight: bold; font-family: sans-serif;">←</button>
            <input type="text" id="searchInput" placeholder="Search with Loaigle..." onkeydown="if(event.key === 'Enter') search()">
            
            <button id="voice-search-btn" onclick="triggerVoiceCapture()" style="background: #303134; border: 1px solid #3c4043; font-size: 16px; cursor: pointer; padding: 0; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #bdc1c6; transition: all 0.2s ease; box-sizing: border-box; margin: 0 8px; -webkit-tap-highlight-color: transparent;" ontouchstart="this.style.background='#3c4043'; this.style.borderColor='#5f6368';" ontouchend="this.style.background='#303134'; this.style.borderColor='#3c4043';">
                🎙️
            </button>
            
            <button onclick="search()">Search</button>
        </div>

        <div id="dictionary-box"></div>
        <div id="results"></div>
    </div>

    <div id="loaigle-settings-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 40000; padding: 20px;">
        <div style="background: #202124; border: 1px solid #3c4043; border-radius: 16px; max-width: 450px; width: 100%; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: monospace; color: #fff; box-sizing: border-box; text-align: left;">
            
            <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #3c4043; padding-bottom: 12px; margin-bottom: 20px;">
                <h3 style="color: #8ab4f8; margin: 0; font-size: 18px;">⚙️ SYSTEM LAYOUT CONTROLS</h3>
                <button onclick="toggleSettingsMenu()" style="background: transparent; color: #9aa0a6; border: none; font-size: 18px; cursor: pointer;">✕</button>
            </div>

            <div style="margin-bottom: 25px;">
                <h4 style="color: #bdc1c6; margin: 0 0 10px 0; font-size: 14px;">🎨 Interface Skins</h4>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="display: flex; gap: 10px;">
                        <button id="theme-btn-dark" onclick="setThemeStyle('dark')" style="flex: 1; background: #303134; color: #fff; border: 1px solid #5f6368; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: monospace;">Onyx Dark</button>
                        <button id="theme-btn-light" onclick="setThemeStyle('light')" style="flex: 1; background: #303134; color: #fff; border: 1px solid #3c4043; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: monospace;">Classic Light</button>
                    </div>
                    <button id="theme-btn-auto" onclick="setThemeStyle('auto')" style="background: #303134; color: #fff; border: 1px solid #3c4043; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: monospace; text-align: center;">🔄 System Auto Sync</button>
                </div>
            </div>

            <div>
                <h4 style="color: #bdc1c6; margin: 0 0 10px 0; font-size: 14px;">🔐 Session Authentication Profile</h4>
                <p id="settings-sync-indicator" style="font-size: 12px; color: #9aa0a6; margin: 0 0 20px 0; line-height: 1.4;">Active Session: Verifying credentials...</p>
                
                <button id="settings-btn-save" onclick="pushConfigsToCloud()" style="display: none; background: #34a853; color: #fff; border: none; padding: 12px 15px; width: 100%; border-radius: 24px; cursor: pointer; font-weight: bold; margin-bottom: 12px; text-align: center; font-family: monospace;">Push Local Configs to Cloud Matrix</button>
                <button id="settings-btn-logout" onclick="triggerSignOut()" style="background: #ea4335; color: #fff; border: none; padding: 12px 15px; width: 100%; border-radius: 24px; cursor: pointer; font-weight: bold; text-align: center; font-family: monospace;">Terminate Session & Log Out</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
