<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loaigle</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div style="width: 100%; display: flex; justify-content: flex-end; padding: 15px; box-sizing: border-box; position: absolute; top: 0; left: 0; z-index: 10000;">
        <button onclick="toggleSettingsMenu()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #bdc1c6; padding: 5px 10px;">⚙️</button>
    </div>

    <div class="logo">Loaigle</div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search with Loaigle..." onkeydown="if(event.key === 'Enter') search()">
        <button onclick="search()">Search</button>
    </div>

    <div id="dictionary-box"></div>
    <div id="results"></div>

    <div id="loaigle-settings-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 40000; padding: 20px;">
        <div style="background: #202124; border: 1px solid #3c4043; border-radius: 16px; max-width: 450px; width: 100%; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: monospace; color: #fff; box-sizing: border-box; text-align: left;">
            
            <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #3c4043; padding-bottom: 12px; margin-bottom: 20px;">
                <h3 style="color: #8ab4f8; margin: 0; font-size: 18px;">⚙️ SYSTEM LAYOUT CONTROLS</h3>
                <button onclick="toggleSettingsMenu()" style="background: transparent; color: #9aa0a6; border: none; font-size: 18px; cursor: pointer;">✕</button>
            </div>

            <div style="margin-bottom: 25px;">
                <h4 style="color: #bdc1c6; margin: 0 0 10px 0; font-size: 14px;">🎨 Interface Skins</h4>
                <div style="display: flex; gap: 10px;">
                    <button onclick="setThemeStyle('dark')" style="flex: 1; background: #303134; color: #fff; border: 1px solid #5f6368; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">Onyx Dark</button>
                    <button onclick="setThemeStyle('light')" style="flex: 1; background: #f8f9fa; color: #202124; border: 1px solid #dadce0; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">Classic Light</button>
                </div>
            </div>

            <div>
                <h4 style="color: #bdc1c6; margin: 0 0 10px 0; font-size: 14px;">🔐 Cloud Infrastructure Sync</h4>
                <p id="settings-sync-indicator" style="font-size: 12px; color: #9aa0a6; margin: 0 0 15px 0; line-height: 1.4;">Active Session: Offline</p>
                
                <div style="display: flex; align-items: center; justify-content: space-between; background: #303134; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #3c4043;">
                    <span style="font-size: 13px; font-weight: bold;">Google Network Connect</span>
                    <button id="settings-btn-google" style="padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; background: #ea4335; color: white;">Connect</button>
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; background: #303134; padding: 12px; border-radius: 8px; border: 1px solid #3c4043; margin-bottom: 20px;">
                    <span style="font-size: 13px; font-weight: bold;">GitHub Repository Node</span>
                    <button id="settings-btn-github" style="padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #5f6368; background: #24292e; color: white;">Connect</button>
                </div>
                
                <button id="settings-btn-save" style="display: none; background: #34a853; color: #fff; border: none; padding: 12px 15px; width: 100%; border-radius: 24px; cursor: pointer; font-weight: bold; margin-top: 10px; text-align: center;">Push Local Configs to Cloud Matrix</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
